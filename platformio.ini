

[common]
flags =
	-g -O2
	-DCORE_DEBUG_LEVEL=3
	-DCONFIG_NIMBLE_CPP_LOG_LEVEL=1
	-DNIMBLE_CPP_LOG_LEVEL=1
	; -DCONFIG_BT_NIMBLE_EXT_ADV

[env]
build_type = debug
monitor_filters = esp32_exception_decoder
monitor_speed = 115200
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip

; platform_packages = tool-openocd-esp32 @ https://github.com/Jason2866/openocd-esp32/releases/download/23/openocd-macos-arm64.tar.gz
; platform_packages = tool-openocd-esp32 @ https://github.com/Jason2866/openocd-esp32/releases/download/v0.12.0-esp32-20250226/openocd-macos-arm64.tar.gz
lib_deps =
    https://github.com/h2zero/NimBLE-Arduino#master
	https://github.com/mathertel/OneButton
[env:atom-s3u]
board = esp32-s3-devkitc-1
debug_tool = esp-builtin
debug_init_break = tbreak app_main
build_flags =
	-DARDUINO_ATOMS3U
    -DARDUINO_USB_CDC_ON_BOOT=1
	-DBUTTON_PIN=41
	${common.flags}


; board = m5stack-coreS3
[env:m5stamp-c3u]
debug_tool = esp-builtin
debug_init_break = tbreak app_main
board = esp32-c3-devkitm-1
board_build.mcu = esp32c3
board_build.partitions = huge_app.csv
board_build.variant = esp32c3
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio
board_build.arduino.ldscript = esp32c3_out.ld
build_unflags =
	-DARDUINO_ESP32_DEV
build_flags =
	${common.flags}
	-DM5STAMP_C3U
    -DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1

[env:seed-c6]
debug_tool = esp-builtin
debug_init_break = tbreak app_main
board = seeed_xiao_esp32c6
build_flags =
	${common.flags}

[env:m5stick-c]
board = m5stick-c
build_flags =
	${common.flags}